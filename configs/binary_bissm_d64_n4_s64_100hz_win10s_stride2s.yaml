paths:
  data_path: data/cpsc_2018_labeled_single_lead.parquet
  splits_dir: splits/
  runs_dir: runs/
split:
  method: holdout
  seed: 42
  group_id_col: record_id
  train_ratio: 0.7
  val_ratio: 0.1
preprocessing:
  fs_target: 100
  target_seconds: 10.0
  normalize: zscore
  windowing:
    enabled: true
    window_seconds: 10.0
    stride_seconds: 2.0
    pad_remainder: false
model:
  name: ecgmamba
  backbone: bissm
  d_model: 64
  n_layers: 4
  dropout: 0.1
  state_dim: 64
  kernel_size: 4
  expansion: 2
  ffn_hidden_mult: 4
  ffn_kernel_size: 1
  use_encoder: true
  use_layernorm: true
  use_ffn: true
training:
  batch_size: 16
  epochs: 50
  lr: 0.001
  weight_decay: 0.05
  warmup_ratio: 0.05
  patience: 10
  grad_clip: 1.0
  mixed_precision: false
  weighted_sampler: false
  deterministic: true
eval:
  tsne: false

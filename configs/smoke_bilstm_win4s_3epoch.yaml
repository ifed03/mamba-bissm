paths:
  data_path: data/cpsc_2018_labeled_single_lead.parquet
  splits_dir: splits/
  runs_dir: runs/
split:
  method: holdout
  seed: 42
  group_id_col: record_id
  train_ratio: 0.7
  val_ratio: 0.1
preprocessing:
  fs_target: 100
  target_seconds: 4.0
  normalize: zscore
  windowing:
    enabled: true
    window_seconds: 4.0
    stride_seconds: 2.0
    pad_remainder: false
model:
  name: bilstm
  hidden_size: 64
  num_layers: 2
  bidirectional: true
  dropout: 0.1
  pooling: mean
training:
  batch_size: 16
  epochs: 20
  lr: 0.001
  weight_decay: 0.05
  warmup_ratio: 0.05
  patience: 3
  grad_clip: 1.0
  mixed_precision: false
  weighted_sampler: false
  deterministic: true
eval:
  tsne: false

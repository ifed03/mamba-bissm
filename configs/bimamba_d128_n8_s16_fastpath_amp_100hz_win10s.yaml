paths:
  data_path: data/cpsc_2018_labeled_single_lead.parquet
  splits_dir: splits/
  runs_dir: runs/
split:
  method: holdout
  seed: 42
  group_id_col: record_id
  train_ratio: 0.8
  val_ratio: 0.1
preprocessing:
  fs_target: 100
  target_seconds: 10.0
  normalize: zscore
  windowing:
    enabled: true
    window_seconds: 10.0
    pad_remainder: true
model:
  name: bimamba
  backbone: bimamba
  d_model: 128
  n_layers: 8
  dropout: 0.1
  d_state: 16
  d_conv: 4
  expand: 2
  use_fast_path: true
  use_encoder: true
  use_layernorm: true
training:
  batch_size: 16
  epochs: 50
  lr: 0.001
  weight_decay: 0.05
  warmup_ratio: 0.05
  patience: 10
  grad_clip: 1.0
  mixed_precision: true
  accumulation_steps: 4
  weighted_sampler: false
  deterministic: true
eval:
  tsne: false
